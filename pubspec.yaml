name: mestres_do_calculo
description: App educativo de tabuada para crianças de 6 a 12 anos.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Gerenciamento de Estado
  provider: ^6.1.1
  
  # Persistência Local
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Áudio
  audioplayers: ^5.2.1
  
  # Animações
  lottie: ^2.7.0
  confetti: ^0.7.0
  
  # Feedback Tátil: Usando HapticFeedback nativo do Flutter (sem dependência externa)
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#hex_code"
    theme_color: "#hex_code"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48 # min:48, max:256, default: 48


flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/character/
    - assets/images/backgrounds/
    - assets/sounds/music/
    - assets/sounds/sfx/
    - assets/animations/lottie/
